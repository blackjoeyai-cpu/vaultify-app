name: vaultify
description: "A secure offline-first password vault"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Navigation
  go_router: ^14.2.0
  
  # Security
  flutter_secure_storage: ^9.0.0
  pointycastle: ^3.9.1
  local_auth: ^2.3.0
  
  # Utilities
  uuid: ^4.4.2
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  
  # UI
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.1

dependency_overrides:
  path_provider_foundation: 2.1.2

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icon/
