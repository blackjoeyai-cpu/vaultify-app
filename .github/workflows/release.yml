name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: read

jobs:
  version-bump:
    name: Version Bump and Tag
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get bump type
        id: bump_type
        run: |
          # Try to find the PR associated with this commit to check labels
          PR_NUMBER=$(gh pr list --commit ${{ github.sha }} --state merged --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            LABELS=$(gh pr view $PR_NUMBER --json labels --jq '.labels[].name')
            if echo "$LABELS" | grep -iq "major"; then
              echo "type=major" >> $GITHUB_OUTPUT
            elif echo "$LABELS" | grep -iq "minor"; then
              echo "type=minor" >> $GITHUB_OUTPUT
            else
              echo "type=patch" >> $GITHUB_OUTPUT
            fi
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version and update changelog
        run: |
          BUMP_TYPE=${{ steps.bump_type.outputs.type }}
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          dart tool/release_helper.dart $BUMP_TYPE "$COMMIT_MSG"

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pubspec.yaml CHANGELOG.md
          git commit -m "chore: bump version [skip ci]"
          git push origin main

      - name: Create and push tag
        id: tag_version
        run: |
          NEW_VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          TAG="v${NEW_VERSION%+*}"
          git tag $TAG
          # Use RELEASE_TOKEN to ensure subsequent workflows are triggered if it's provided
          git push origin $TAG
          echo "new_tag=$TAG" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true
      
      - run: flutter pub get

  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true
      
      - run: flutter pub get
      
      - run: flutter build apk --debug
        env:
          FLUTTER_BUILD_APPBundle: false
      
      - uses: actions/upload-artifact@v4
        with:
          name: vaultify-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          overwrite: true

  build-release-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true
      
      - run: flutter pub get
      
      - run: flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: vaultify-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk
          overwrite: true

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-debug-apk, build-release-apk]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changelog entry
        id: changelog_reader
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_CLEAN="${VERSION#v}"
          # Extract entry for this version from CHANGELOG.md
          sed -n "/## \[$VERSION_CLEAN\]/,/## /p" CHANGELOG.md | sed '$d' > release_notes.md
          # If file is empty, use commit message
          if [ ! -s release_notes.md ]; then
            echo "${{ github.event.head_commit.message }}" > release_notes.md
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
