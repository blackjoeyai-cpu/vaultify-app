name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          cache: true
      
      - run: flutter pub get
      
      - run: flutter analyze
        env:
          FLUTTER_ANALYZE_NO_WARNING: 1

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          cache: true
      
      - run: flutter pub get
      
      - run: flutter test

  build-android:
    name: Build Android (Debug)
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          cache: true
      
      - run: flutter pub get
      
      - run: flutter build apk --debug
        env:
          FLUTTER_BUILD_APPBundle: false
      
      - uses: actions/upload-artifact@v4
        with:
          name: vaultify-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          overwrite: true