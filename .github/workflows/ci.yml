name: CI

on:
  push:
    branches:
      - dev
      - '**'  # All branches for feature branch testing
  pull_request:
    branches:
      - dev

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true
      
      - run: flutter pub get
      
      - run: flutter analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true
      
      - run: flutter pub get
      
      - run: flutter test --reporter compact
        env:
          TEST_CORRECT_PASSWORD: ${{ secrets.TEST_CORRECT_PASSWORD }}
          TEST_WRONG_PASSWORD: ${{ secrets.TEST_WRONG_PASSWORD }}
          TEST_DIFFERENT_PASSWORD: ${{ secrets.TEST_DIFFERENT_PASSWORD }}
          TEST_SECRET_DATA: ${{ secrets.TEST_SECRET_DATA }}
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test_results/
          retention-days: 7

  build-android:
    name: Build Android (Debug)
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true
      
      - run: flutter pub get
      
      - run: flutter build apk --debug
      
      - uses: actions/upload-artifact@v4
        with:
          name: vaultify-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          overwrite: true